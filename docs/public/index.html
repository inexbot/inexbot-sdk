<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>iNexBot</title>
<script>
(function(){
  var lang = (navigator.languages && navigator.languages[0] || navigator.language || '').toLowerCase();
  var target;
  if (/^zh/.test(lang)) {
    target = '/zh/';
  } else if (/^ko/.test(lang)) {
    target = '/kr/';
  } else {
    target = '/en/';
  }
  location.replace(target);
})();
</script>
</head>
<body>
<p>Redirecting...</p>
</body>
</html>
